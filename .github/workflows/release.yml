name: Publish Electron App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Build/package application
        run: npm run make
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: ${{ matrix.os == 'windows-latest' && 'C:/tmp/make' || 'out/make' }}

  release:
    runs-on: ubuntu-latest
    needs: build
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Get tag
        id: get_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi
      - name: Create and push tag
        continue-on-error: true
        shell: bash
        run: |
          git tag ${{ steps.get_tag.outputs.tag_name }}
          git push origin ${{ steps.get_tag.outputs.tag_name }}
      - name: Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          files: |
            dist/dist-macos-latest/**/*.dmg
            dist/dist-windows-latest/**/*.exe
            dist/dist-windows-latest/**/*.nupkg
            dist/dist-windows-latest/**/RELEASES
          draft: true
            dist/**/*.zip
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.nupkg
            dist/**/RELEASES
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_GITHUB_PAT }}
