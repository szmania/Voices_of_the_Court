<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="app.title">Voices of the Court 2.0 - Community Edition</title>
    <link rel="stylesheet" href="config.css" />
    <link rel="stylesheet" href="../chatWindow/theme.css" />
    <style>
      @keyframes blink-border {
        0% { box-shadow: 0 0 2px 0px #fff; }
        50% { box-shadow: 0 0 8px 2px #00aaff; }
        100% { box-shadow: 0 0 2px 0px #fff; }
      }
      .blinking {
        animation: blink-border 1.5s infinite;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <ul>
        <li><a href="connection.html" data-i18n="nav.connection">Connection</a></li>
        <li><a href="actions.html" data-i18n="nav.actions">Actions</a></li>
        <li><a href="summarization.html" data-i18n="nav.summarization">Summarization</a></li>
        <li><a href="prompts.html" data-i18n="nav.prompts">Prompts</a></li>
        <li><a href="letters.html" data-i18n="nav.letters">Letters</a></li>
        <li class="active"><a href="diaries.html" data-i18n="nav.diaries">Diaries</a></li>
        <li><a href="settings.html" data-i18n="nav.settings">Settings</a></li>
        <li><a href="system.html" data-i18n="nav.system">System</a></li>
        <li class="help-menu"><a href="#" id="open-readme" data-i18n="nav.help">Help</a></li>
        <language-selector></language-selector>
      </ul> 
    </div>

    <div class="container" id="container">
      <div id="diary-manager-container" class="border">
        <div id="diary-manager-loader" class="loader" style="display: none;"></div>
        <h2 data-i18n="diary_manager.header">Diary Manager</h2>
        <div class="header-controls">
            <button id="diary-manager-refreshBtn" class="btn" data-i18n="diary_manager.refresh" data-i18n-title="diary_manager.tooltip_refresh">Refresh</button>
            <button id="diary-manager-saveBtn" class="btn btn-success" data-i18n="diary_manager.save_all" data-i18n-title="diary_manager.tooltip_save_all">Save All Diaries</button>
        </div>
    
        <div class="info-panel">
            <div class="info-item">
                <label for="diary-manager-playerIdSelect" data-i18n="diary_manager.player_id">Player ID:</label>
                <select id="diary-manager-playerIdSelect" data-i18n-title="diary_manager.tooltip_player_id"></select>
            </div>
            <div class="info-item">
                <label for="diary-manager-characterSelect" data-i18n="diary_manager.select_character">Select Character:</label>
                <select id="diary-manager-characterSelect" data-i18n-title="diary_manager.tooltip_character">
                    <option value="all" data-i18n="diary_manager.all_characters">All Characters</option>
                </select>
            </div>
            <div class="info-item">
                <label for="diary-manager-diaryPath" data-i18n="diary_manager.file_path">Diary File Path:</label>
                <input type="text" id="diary-manager-diaryPath" readonly data-i18n-title="diary_manager.tooltip_diary_path">
            </div>
        </div>
    
        <div class="summary-list-container">
            <div class="summary-list-header">
              <h3 data-i18n="diary_manager.list_header">Diary List</h3>
              <div class="control-group">
                <label for="diary-sort-order" data-i18n="letters.sort_by">Sort by:</label>
                <select id="diary-sort-order">
                    <option value="gameDate" data-i18n="letters.sort_game_date">Game Date</option>
                    <option value="realDate" data-i18n="letters.sort_real_date">Real Date</option>
                </select>
                <input type="search" id="diary-manager-search" data-i18n-placeholder="diary_manager.search_placeholder" placeholder="Search diaries..." data-i18n-title="diary_manager.tooltip_search">
              </div>
            </div>
            <div id="diary-manager-diaryList" class="summary-list">
                <!-- Diary items will be dynamically generated here -->
            </div>
            <div class="list-controls">
                <button id="diary-manager-deleteItemBtn" class="btn btn-danger" data-i18n="diary_manager.delete_btn" disabled data-i18n-title="diary_manager.tooltip_delete">Delete</button>
                <button id="diary-manager-addDiaryBtn" class="btn" data-i18n="diary_manager.add_new" data-i18n-title="diary_manager.tooltip_add">Add</button>
            </div>
        </div>
    
        <div id="diary-manager-statusMessage" class="status-message"></div>
    </div>
    </div>

    <script>require("../../dist/shared/LocalizationManager.js")</script>
    <script>
      const { LocalizationManager } = require("../../dist/shared/LocalizationManager.js");
      window.LocalizationManager = LocalizationManager;
    </script>
    <script>require("../../dist/configWindow/components/LanguageSelector.js")</script>
    <script>require("../../dist/configWindow/diariesRenderer.js")</script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const openReadmeBtn = document.getElementById('open-readme');
        if (openReadmeBtn) {
          openReadmeBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const { ipcRenderer } = require('electron');
            ipcRenderer.send('open-readme-window');
          });
        }
      });
    </script>
  </body>
</html>
