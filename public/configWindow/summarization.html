<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="app.title">Voices of the Court - Community Edition</title>
    <link rel="stylesheet" href="config.css" />
    <link rel="stylesheet" href="../chatWindow/theme.css" />
    <style>
      .info-panel {
        display: flex;
        gap: 20px; /* Adds space between the items */
        align-items: center; /* Vertically aligns the items in the middle */
      }
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes blink-border {
        0% { box-shadow: 0 0 2px 0px #fff; }
        50% { box-shadow: 0 0 8px 2px #00aaff; }
        100% { box-shadow: 0 0 2px 0px #fff; }
      }
      .blinking {
        animation: blink-border 1.5s infinite;
        border-radius: 5px; /* Ensure the shadow follows the button shape */
      }
      #summary-manager-container {
        display: flex;
        flex-direction: column;
        height: 800px; /* Make it tall */
      }
      /* New styles for layout fixes and search */
      .summary-list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .summary-list-container {
        display: flex;
        flex-direction: column;
        flex-grow: 1; /* Allow this container to grow */
        min-height: 0; /* Important for flex-grow in some browsers */
      }
      #summary-manager-search {
        padding: 4px;
        border-radius: 4px;
        border: 1px solid #ccc;
        position: relative;
        z-index: 1;
      }
      #summary-manager-summaryPath, #summary-manager-summaryContent {
        width: 100%;
        box-sizing: border-box; /* Prevents overflow */
      }
      .info-item {
        flex: 1; /* Allow path input to grow */
        min-width: 0; /* Prevent overflow in flex item */
      }
      mark {
        background-color: yellow;
        color: black;
        padding: 0;
      }
      mark.current-highlight {
        background-color: orange;
      }
      .summary-list {
        flex-grow: 1; /* Let the list fill available space */
        min-height: 200px;
        overflow: auto;
        border: 1px solid #ccc;
        padding: 5px;
      }
      .summary-item {
        padding: 25px; /* Even more padding for taller items */
        border-bottom: 1px solid #444;
        cursor: pointer;
      }
      .summary-item:hover {
        background-color: #3a3a3a;
      }
      .summary-item.selected {
        background-color: #007bff;
        color: white;
      }
      .summary-date {
        font-weight: bold;
        margin-bottom: 5px;
      }
      .summary-content {
        white-space: pre-wrap; /* Allow wrapping */
        word-break: break-word; /* Break long words */
        line-height: 1.6; /* Increased line height for better readability */
      }
      /* In-place editing styles */
      .summary-item-edit {
        border: 2px solid #3498db;
        border-radius: 4px;
        padding: 10px;
        margin-bottom: 10px;
        background-color: #3a3a3a;
        color: #f0f0f0;
      }
      .summary-item-edit input[type="date"],
      .summary-item-edit textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 8px;
        border: 1px solid #777;
        border-radius: 4px;
        box-sizing: border-box;
        background-color: #555;
        color: #f0f0f0;
      }
      .summary-item-edit textarea {
        resize: vertical;
        min-height: 120px; /* Increased height */
        font-family: inherit;
        font-size: inherit;
      }
      .summary-item-edit .edit-controls {
        text-align: right;
        margin-top: 5px;
      }
      .list-controls {
        text-align: right;
        flex-shrink: 0;
        padding-top: 10px;
      }
      .summary-item-edit .edit-controls {
        text-align: right;
        margin-top: 5px;
      }
    </style>
    
  </head>
  <body>
    <div class="navbar">
      <ul>
        <li><a href="connection.html" data-i18n="nav.connection">Connection</a></li>
        <li><a href="actions.html" data-i18n="nav.actions">Actions</a></li>
        <li class="active"><a href="summarization.html" data-i18n="nav.summarization">Summarization</a></li>
        <li><a href="prompts.html" data-i18n="nav.prompts">Prompts</a></li>
        <li><a href="settings.html" data-i18n="nav.settings">Settings</a></li>
        <li><a href="system.html" data-i18n="nav.system">System</a></li>
        <li class="help-menu"><a href="#" id="open-readme" data-i18n="nav.help">Help</a></li>
        <language-selector></language-selector>
      </ul> 
    </div>
    
    <div class="container" id="container">

        <config-checkbox id="use-connection-api" confID="summarizationUseTextGenApi" data-i18n="summarization.use_same_api"></config-checkbox>

        <div class="border">   
            <config-api-selector id="api-selector" confID="summarizationApiConnectionConfig"></config-api-selector>      
        </div>
        <br>

        <h2 data-i18n="summarization.parameters">Parameters</h2>
        <parameters-box confID="summarizationApiConnectionConfig" tempDefault="0.2" freqPenDefault ="0" presPenDefault="0" topPDefault="0.9"></parameters-box>

        <br>
        <div id="summary-manager-container" class="border">
            <div id="summary-manager-loader" class="loader" style="display: none;"></div>
            <h2 data-i18n="summary_manager.header">Summary Manager</h2>
            <div class="header-controls">
                <button id="summary-manager-refreshBtn" class="btn" data-i18n="summary_manager.refresh" data-i18n-title="summary_manager.tooltip_refresh">Refresh</button>
                <button id="summary-manager-saveBtn" class="btn btn-success" data-i18n="summary_manager.save_all" data-i18n-title="summary_manager.tooltip_save_all">Save All Summaries</button>
            </div>
        
            <div class="info-panel">
                <div class="info-item">
                    <label for="summary-manager-playerIdSelect" data-i18n="summary_manager.player_id">Player ID:</label>
                    <select id="summary-manager-playerIdSelect" data-i18n-title="summary_manager.tooltip_player_id"></select>
                </div>
                <div class="info-item">
                    <label for="summary-manager-characterSelect" data-i18n="summary_manager.select_character">Select Character:</label>
                    <select id="summary-manager-characterSelect" data-i18n-title="summary_manager.tooltip_character">
                        <option value="all" data-i18n="summary_manager.all_characters">All Characters</option>
                    </select>
                </div>
                <div class="info-item">
                    <label for="summary-manager-summaryPath" data-i18n="summary_manager.file_path">Summary File Path:</label>
                    <input type="text" id="summary-manager-summaryPath" readonly data-i18n-title="summary_manager.tooltip_summary_path">
                </div>
            </div>
        
            <div class="summary-list-container">
                <div class="summary-list-header">
                  <h3 data-i18n="summary_manager.list_header">Summary List</h3>
                  <input type="search" id="summary-manager-search" data-i18n-placeholder="summary_manager.search_placeholder" placeholder="Search summaries..." data-i18n-title="summary_manager.tooltip_search">
                </div>
                <div id="summary-manager-summaryList" class="summary-list">
                    <!-- Summary items will be dynamically generated here -->
                </div>
                <div class="list-controls">
                    <button id="summary-manager-deleteItemBtn" class="btn btn-danger" data-i18n="summary_manager.delete_btn" disabled data-i18n-title="summary_manager.tooltip_delete">Delete</button>
                    <button id="summary-manager-addSummaryBtn" class="btn" data-i18n="summary_manager.add_new" data-i18n-title="summary_manager.tooltip_add">Add</button>
                </div>
            </div>
        
            <div id="summary-manager-statusMessage" class="status-message"></div>
        </div>
             
    </div>

    <script>require("../../dist/shared/LocalizationManager.js")</script>
    <script>
      const { LocalizationManager } = require("../../dist/shared/LocalizationManager.js");
      window.LocalizationManager = LocalizationManager;
    </script>
    <script>require("../../dist/configWindow/components/LanguageSelector.js")</script>
    <script>require("../../dist/configWindow/components/configCheckbox.js")</script>
    <script>require("../../dist/configWindow/components/apiSelector.js")</script> 
    <script>require("../../dist/configWindow/components/configSlider.js")</script>
    <script>require("../../dist/configWindow/components/ParametersBox.js")</script>
    <script>require("../../dist/configWindow/summarizationRenderer.js")</script>
    
    <script>
      // 添加帮助菜单点击事件
      document.addEventListener('DOMContentLoaded', function() {
        const openReadmeBtn = document.getElementById('open-readme');
        if (openReadmeBtn) {
          openReadmeBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const { ipcRenderer } = require('electron');
            ipcRenderer.send('open-readme-window');
          });
        }
      });
    </script>
    
  </body>
</html>
