<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voices of the Court - Community Edition</title>
    <link rel="stylesheet" href="summaryManager.css">
    <link rel="stylesheet" href="../chatWindow/theme.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 data-i18n="summary_manager.header">Summary Manager</h1>
            <div class="header-controls">
                <button id="refreshBtn" class="btn btn-primary" data-i18n="summary_manager.refresh">Refresh</button>
                <button id="saveBtn" class="btn btn-success" data-i18n="summary_manager.save">Save</button>
                <button id="closeBtn" class="btn btn-secondary" data-i18n="summary_manager.close">Close</button>
            </div>
        </header>

        <main class="main-content">
            <div class="info-panel">
                <div class="info-item">
                    <label for="playerId" data-i18n="summary_manager.player_id">Player ID:</label>
                    <input type="text" id="playerId" readonly>
                </div>
                <div class="info-item">
                    <label for="characterSelect" data-i18n="summary_manager.select_character">Select Character:</label>
                    <select id="characterSelect">
                        <option value="all" data-i18n="summary_manager.all_characters">All Characters</option>
                    </select>
                </div>
                <div class="info-item">
                    <label for="summaryPath" data-i18n="summary_manager.file_path">Summary File Path:</label>
                    <input type="text" id="summaryPath" readonly>
                </div>
            </div>

            <div class="summary-list-container">
                <h2 data-i18n="summary_manager.list_header">Summary List</h2>
                <div id="summaryList" class="summary-list">
                    <!-- Summary items will be dynamically generated here -->
                </div>
                <div class="list-controls">
                    <button id="addSummaryBtn" class="btn btn-primary" data-i18n="summary_manager.add_new">Add New Summary</button>
                </div>
            </div>

            <div class="summary-editor">
                <h2 data-i18n="summary_manager.edit_header">Edit Summary</h2>
                <div class="editor-form">
                    <div class="form-group">
                        <label for="summaryDate" data-i18n="summary_manager.date_label">Date:</label>
                        <input type="text" id="summaryDate" data-i18n-placeholder="summary_manager.date_placeholder" placeholder="e.g., 1179-03-21">
                    </div>
                    <div class="form-group">
                        <label for="summaryContent" data-i18n="summary_manager.content_label">Content:</label>
                        <textarea id="summaryContent" rows="10" data-i18n-placeholder="summary_manager.content_placeholder" placeholder="Enter summary content..."></textarea>
                    </div>
                    <div class="editor-controls">
                        <button id="updateSummaryBtn" class="btn btn-success" data-i18n="summary_manager.update_btn">Update Summary</button>
                        <button id="deleteSummaryBtn" class="btn btn-danger" data-i18n="summary_manager.delete_btn">Delete Summary</button>
                        <button id="newSummaryBtn" class="btn btn-primary" data-i18n="summary_manager.new_btn">New Summary</button>
                    </div>
                </div>
            </div>
        </main>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>require("../../dist/shared/LocalizationManager.js")</script>
    <script>
      const { LocalizationManager } = require("../../dist/shared/LocalizationManager.js");
      window.LocalizationManager = LocalizationManager;
    </script>
    <script src="summaryManagerRenderer.js"></script>
</body>
</html>
